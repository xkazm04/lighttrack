# LightTrack local stack. Run from this directory:  docker compose up --build
# (Build context is the repo root.)
name: lighttrack

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: ghcr.io/xkazm04/lighttrack:dev
    ports:
      - "8787:8787"
    environment:
      LIGHTTRACK_BIND: 0.0.0.0:8787
      LIGHTTRACK_DB: /data/lighttrack.db
      # Set these in a .env file (git-ignored) for an enforced deployment:
      LIGHTTRACK_AUTH_MODE: ${LIGHTTRACK_AUTH_MODE:-dev}
      LIGHTTRACK_ADMIN_KEY: ${LIGHTTRACK_ADMIN_KEY:-}
    volumes:
      - lt-data:/data
    restart: unless-stopped

volumes:
  lt-data:

